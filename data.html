<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Data Dokumen</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="header">
      <h1>HELPIFY</h1>
      <div class="user-info" onclick="toggleDropdown()">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <span id="usernameDisplay"></span>
        <i class="fa-solid fa-chevron-down"></i>
        <div class="dropdown-menu" id="dropdownMenu">
          <div onclick="openChangePassword()">Ubah Password</div>
          <div onclick="logout()">Logout</div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Menu Utama</div>
      <ul>
        <li>
          <a href="index.html"
            ><i class="fa-solid fa-chart-line"></i> Dashboard</a
          >
        </li>
        <li>
          <a href="input.html"
            ><i class="fa-solid fa-file-circle-plus"></i> Input Dokumen</a
          >
        </li>
        <li>
          <a href="data.html" class="active"
            ><i class="fa-solid fa-database"></i> Data Dokumen</a
          >
        </li>
        <li>
          <a href="riwayat.html"
            ><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pembayaran</a
          >
        </li>
        <li>
          <a href="#" onclick="logout()"
            ><i class="fa-solid fa-right-from-bracket"></i> Logout</a
          >
        </li>
      </ul>
    </div>

    <div class="main">
      <div class="navbar">Data Dokumen Pembayaran</div>
      <div class="table-container">
        <div
          style="display: flex; justify-content: flex-end; margin-bottom: 10px"
        >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              background: #f1f3f6;
              border: 1px solid #d3d3d3;
              border-radius: 6px;
              padding: 6px 12px;
            "
          >
            <i class="fa-solid fa-magnifying-glass" style="color: #0f2573"></i>
            <input
              id="searchInput"
              type="text"
              placeholder="Cari No SPPB atau Nama..."
              oninput="filterTable()"
              style="
                border: none;
                background: transparent;
                outline: none;
                font-size: 14px;
                width: 220px;
                color: #333;
              "
            />
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>No SPPB</th>
              <th>Nama</th>
              <th>Nominal</th>
              <th>Tgl Terima</th>
              <th>Tgl Rencana Bayar</th>
              <th>Kode CC</th>
              <th>Status</th>
              <th>Bukti</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="8" class="empty-data">Belum ada data dokumen</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      let loginUser = localStorage.getItem("loginUser");
      if (!loginUser) window.location.href = "login.html";
      document.getElementById("usernameDisplay").innerText = loginUser;

      function toggleDropdown() {
        document.getElementById("dropdownMenu").classList.toggle("show");
      }

      window.onclick = function (e) {
        if (!e.target.closest(".user-info")) {
          document.getElementById("dropdownMenu").classList.remove("show");
        }
      };

      function logout() {
        localStorage.removeItem("loginUser");
        window.location.href = "login.html";
      }

      renderTable();

      function renderTable() {
        fetch("/api/pembayaran")
          .then((res) => res.json())
          .then((data) => {
            window.allData = data.filter((d) => d.status !== "Sudah Bayar");
            tampilkanTable(window.allData);
          });
      }

      function filterTable() {
        let keyword = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        let filtered = (window.allData || []).filter(
          (d) =>
            (d.no_sppb || "").toLowerCase().includes(keyword) ||
            (d.nama || "").toLowerCase().includes(keyword),
        );
        tampilkanTable(filtered);
      }

      function tampilkanTable(data) {
        let tableBody = document.querySelector("tbody");

        if (data.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="8" class="empty-data">Belum ada data dokumen</td></tr>`;
          return;
        }

        tableBody.innerHTML = "";
        data.forEach((d) => {
          tableBody.innerHTML += `
            <tr>
              <td>${d.no_sppb}</td>
              <td>${d.nama}</td>
              <td>${Number(d.nominal).toLocaleString("id-ID")}</td>
              <td>${d.tanggal_terima}</td>
              <td>${d.tanggal_rencana}</td>
              <td>${d.kode_cc}</td>
              <td>
                <select onchange="ubahStatus(${d.id}, this.value)">
                  <option value="Belum Bayar" selected>Belum Bayar</option>
                  <option value="Sudah Bayar">Sudah Bayar</option>
                </select>
              </td>
              <td>-</td>
            </tr>
          `;
        });
      }

      function ubahStatus(id, value) {
        if (value !== "Sudah Bayar") return;

        let input = document.createElement("input");
        input.type = "file";
        input.accept = "application/pdf";

        input.onchange = function (e) {
          let file = e.target.files[0];
          if (!file) {
            renderTable();
            return;
          }
          if (file.type !== "application/pdf") {
            alert("File harus PDF!");
            renderTable();
            return;
          }

          let reader = new FileReader();
          reader.onload = function () {
            let today = new Date().toLocaleDateString("id-ID");

            fetch(`/api/pembayaran/${id}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                status: "Sudah Bayar",
                tanggal_realisasi: today,
                bukti: reader.result,
              }),
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  alert("Berhasil! Dokumen dipindahkan ke Riwayat Pembayaran.");
                  renderTable();
                } else {
                  alert("Gagal update status!");
                }
              });
          };
          reader.readAsDataURL(file);
        };

        input.oncancel = function () {
          renderTable();
        };
        input.click();
      }
    </script>
  </body>
</html>
