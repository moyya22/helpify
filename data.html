<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Data Dokumen</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="header">
      <h1>HELPIFY</h1>
      <div class="user-info" onclick="toggleDropdown()">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <span id="usernameDisplay"></span>
        <i class="fa-solid fa-chevron-down"></i>
        <div class="dropdown-menu" id="dropdownMenu">
          <div onclick="openChangePassword()">Ubah Password</div>
          <div onclick="logout()">Logout</div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Menu Utama</div>
      <ul>
        <li>
          <a href="index.html"
            ><i class="fa-solid fa-chart-line"></i> Dashboard</a
          >
        </li>
        <li>
          <a href="input.html"
            ><i class="fa-solid fa-file-circle-plus"></i> Input Dokumen</a
          >
        </li>
        <li>
          <a href="data.html" class="active"
            ><i class="fa-solid fa-database"></i> Data Dokumen</a
          >
        </li>
        <li>
          <a href="riwayat.html"
            ><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pembayaran</a
          >
        </li>
        <li>
          <a href="#" onclick="logout()"
            ><i class="fa-solid fa-right-from-bracket"></i> Logout</a
          >
        </li>
      </ul>
    </div>

    <div class="main">
      <div class="navbar">Data Dokumen Pembayaran</div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>No SPPB</th>
              <th>Nama</th>
              <th>Nominal</th>
              <th>Tgl Terima</th>
              <th>Tgl Rencana Bayar</th>
              <th>Kode CC</th>
              <th>Kode Ref</th>
              <th>Status</th>
              <th>Bukti</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="6" class="empty-data">Belum ada data dokumen</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      let loginUser = localStorage.getItem("loginUser");
      if (!loginUser) window.location.href = "login.html";

      document.getElementById("usernameDisplay").innerText = loginUser;

      function toggleDropdown() {
        document.getElementById("dropdownMenu").classList.toggle("show");
      }

      window.onclick = function (e) {
        if (!e.target.closest(".user-info")) {
          document.getElementById("dropdownMenu").classList.remove("show");
        }
      };

      function logout() {
        localStorage.removeItem("loginUser");
        window.location.href = "login.html";
      }

      function openChangePassword() {
        document.getElementById("passwordModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("passwordModal").style.display = "none";
      }

      function changePassword() {
        let oldPass = document.getElementById("oldPass").value;
        let newPass = document.getElementById("newPass").value;
        let savedPass = localStorage.getItem("loginPass") || "admin";
        if (oldPass === savedPass) {
          localStorage.setItem("loginPass", newPass);
          alert("Password berhasil diubah!");
          closeModal();
        } else {
          alert("Password lama salah!");
        }
      }

      renderTable();

      function renderTable() {
        let tableBody = document.querySelector("tbody");
        let allData = JSON.parse(localStorage.getItem("dokumen")) || [];
        let data = allData.filter((d) => d.status !== "Sudah Bayar");

        if (data.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="10" class="empty-data">Belum ada data dokumen</td></tr>`;
          return;
        }

        tableBody.innerHTML = "";
        data.forEach((d) => {
          let realIndex = allData.indexOf(d);
          tableBody.innerHTML += `
      <tr>
        <td>${d.spp}</td>
        <td>${d.nama}</td>
        <td>${d.nominal}</td>
        <td>${d.tanggal}</td>
        <td>${d.rencana}</td>
        <td>${d.cc}</td>
        <td>${d.ref}</td>
        <td>
          <select onchange="ubahStatus(${realIndex}, this.value)">
            <option value="Belum Bayar" selected>Belum Bayar</option>
            <option value="Sudah Bayar">Sudah Bayar</option>
          </select>
        </td>
        <td>-</td>
      </tr>
    `;
        });
      }
      function ubahStatus(index, value) {
        let data = JSON.parse(localStorage.getItem("dokumen")) || [];

        if (value === "Sudah Bayar") {
          let input = document.createElement("input");
          input.type = "file";
          input.accept = "application/pdf";

          input.onchange = function (e) {
            let file = e.target.files[0];
            if (!file) {
              alert("Bukti wajib diupload!");
              renderTable();
              return;
            }
            if (file.type !== "application/pdf") {
              alert("File harus PDF!");
              renderTable();
              return;
            }

            let reader = new FileReader();
            reader.onload = function () {
              data[index].status = "Sudah Bayar";
              data[index].bukti = reader.result;
              data[index].realisasi = new Date().toLocaleDateString("id-ID");
              localStorage.setItem("dokumen", JSON.stringify(data));
              alert("Berhasil! Dokumen dipindahkan ke Riwayat Pembayaran.");
              renderTable();
            };
            reader.readAsDataURL(file);
          };

          input.oncancel = function () {
            renderTable();
          };
          input.click();
          return;
        }

        data[index].status = value;
        data[index].bukti = "";
        data[index].realisasi = "";
        localStorage.setItem("dokumen", JSON.stringify(data));
        renderTable();
      }
    </script>
  </body>
</html>
