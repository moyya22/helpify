<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Input Dokumen</title>

    <link rel="stylesheet" href="css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="header">
      <h1>HELPIFY</h1>

      <div class="user-info" onclick="toggleDropdown()">
        <div class="user-avatar">
          <i class="fas fa-user"></i>
        </div>

        <span id="usernameDisplay"></span>
        <i class="fa-solid fa-chevron-down"></i>

        <div class="dropdown-menu" id="dropdownMenu">
          <div onclick="openChangePassword()">Ubah Password</div>
          <div onclick="logout()">Logout</div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-title">Menu Utama</div>

      <ul>
        <li>
          <a href="index.html"
            ><i class="fa-solid fa-chart-line"></i>Dashboard</a
          >
        </li>
        <li>
          <a href="input.html" class="active"
            ><i class="fa-solid fa-file-circle-plus"></i>Input Dokumen</a
          >
        </li>
        <li>
          <a href="data.html"
            ><i class="fa-solid fa-database"></i>Data Dokumen</a
          >
        </li>
        <li>
          <a href="riwayat.html"
            ><i class="fa-solid fa-clock-rotate-left"></i>Riwayat Pembayaran</a
          >
        </li>
        <li>
          <a href="#" onclick="logout()"
            ><i class="fa-solid fa-right-from-bracket"></i>Logout</a
          >
        </li>
      </ul>
    </div>

    <div class="main">
      <div class="navbar">Input Dokumen</div>

      <div class="form-container">
        <form onsubmit="saveData(event)">
          <label>Tanggal Terima Dokumen</label>
          <input id="tanggal" type="date" required />

          <label>No SPPb</label>
          <input id="spp" type="text" placeholder="Masukkan No SPPb" required />

          <label>Kode CC</label>
          <input id="cc" type="number" placeholder="Masukkan No CC" required />

          <label>Kode Ref</label>
          <input
            id="ref"
            type="number"
            placeholder="Masukkan Kode Ref"
            required
          />

          <label>Nama Vendor/Karyawan</label>
          <input
            id="nama"
            type="text"
            placeholder="Masukkan Nama Vendor/Karyawan"
            required
          />

          <label>Jenis Dokumen</label>
          <select id="jenis" required>
            <option value="">Pilih Jenis Dokumen</option>
            <option>Gaji Karyawan Tetap</option>
            <option>Gaji Karyawan Lepas</option>
            <option>Pembayaran Vendor Urgent</option>
            <option>Pembayaran Vendor Non Urgent</option>
            <option>Pembayaran Mingguan</option>
          </select>

          <label>Nominal Pembayaran</label>
          <input
            id="nominal"
            type="number"
            placeholder="Masukkan Nominal Pembayaran"
            required
          />

          <label>Tanggal Rencana Bayar</label>
          <input id="rencana" type="date" required />
          <button type="submit" class="btn">Simpan</button>
        </form>
      </div>
    </div>

    <script>
      let loginUser = localStorage.getItem("loginUser");

      if (!loginUser) {
        window.location.href = "login.html";
      }

      document.getElementById("usernameDisplay").innerText = loginUser;

      function toggleDropdown() {
        document.getElementById("dropdownMenu").classList.toggle("show");
      }

      window.onclick = function (e) {
        if (!e.target.closest(".user-info")) {
          document.getElementById("dropdownMenu").classList.remove("show");
        }
      };

      function logout() {
        localStorage.removeItem("loginUser");
        window.location.href = "login.html";
      }

      function openChangePassword() {
        document.getElementById("passwordModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("passwordModal").style.display = "none";
      }

      function changePassword() {
        let oldPass = document.getElementById("oldPass").value;
        let newPass = document.getElementById("newPass").value;

        let savedPass = localStorage.getItem("loginPass") || "admin";

        if (oldPass === savedPass) {
          localStorage.setItem("loginPass", newPass);
          alert("Password berhasil diubah!");
          closeModal();
        } else {
          alert("Password lama salah!");
        }
      }

      function saveData(e) {
        e.preventDefault();

        let inputs = document.querySelectorAll("input");
        let select = document.querySelector("select");

        let data = {
          tanggal: inputs[0].value, // tanggal terima
          spp: inputs[1].value,
          cc: inputs[2].value,
          ref: inputs[3].value,
          nama: inputs[4].value,
          jenis: select.value,
          nominal: inputs[5].value,
          rencana: inputs[6].value, // tanggal rencana
          status: "Belum Bayar",
          bukti: "",
          realisasi: "", // 🔥 tambahan penting
        };

        let allData = JSON.parse(localStorage.getItem("dokumen")) || [];
        allData.push(data);

        localStorage.setItem("dokumen", JSON.stringify(allData));

        alert("Data berhasil disimpan!");
        window.location.href = "data.html";
      }
    </script>
  </body>
</html>
